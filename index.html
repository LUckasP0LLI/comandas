<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comandas — Xis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   TOKENS & BASE
   ════════════════════════════════════════════ */
:root{
  --bg:#0d0d0d;--surface:#181818;--surface2:#212121;--surface3:#2a2a2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#ede8e1;--muted:#777;--muted2:#444;
  --accent:#f0b429;--accent-dim:rgba(240,180,41,0.10);--accent-dim2:rgba(240,180,41,0.18);
  --red:#e05555;--red-dim:rgba(224,85,85,0.12);
  --green:#4ecb7a;--green-dim:rgba(78,203,122,0.12);
  --hdr-h:54px;--bnav-h:0px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;}

/* ════════════════════════════════════════════
   LOADING & SETUP
   ════════════════════════════════════════════ */
#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;transition:opacity .4s;}
.load-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;color:var(--accent);margin-bottom:16px;}
.load-spin{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

#setup-screen{display:none;align-items:flex-start;justify-content:center;min-height:100vh;padding:1.5rem;overflow-y:auto;}
.setup-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.75rem;max-width:480px;width:100%;margin:auto;}
.setup-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);margin-bottom:6px;}
.sfield{margin-bottom:11px;}
.sfield label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.sfield input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:9px 11px;border-radius:8px;outline:none;}
.sbtn{width:100%;background:var(--accent);color:#000;border:none;font-weight:700;padding:12px;border-radius:9px;cursor:pointer;margin-top:6px;}

/* ════════════════════════════════════════════
   HEADER & NAVIGATION
   ════════════════════════════════════════════ */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;gap:.75rem;height:var(--hdr-h);position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);}
.tabs{display:flex;gap:2px;flex:1;}
.tab-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;}
.tab-btn.active{background:var(--accent-dim2);color:var(--accent);}
.badge-pill{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;padding:0 4px;border-radius:9px;margin-left:4px;}

/* ════════════════════════════════════════════
   COMANDAS GRID & CARDS
   ════════════════════════════════════════════ */
.view{display:none;padding:1.25rem 1.5rem;}
.view.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:relative;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;}
.card.urgente{border-color:var(--red);}.card.urgente::before{background:var(--red);}

.card-top{padding:12px 14px 10px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}
.cli-nome{font-weight:700;font-size:15px;}
.timer-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}
.t-urg{color:var(--red);animation:blink 1.1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

.btn-desp{width:100%;background:var(--accent);color:#000;border:none;font-weight:700;padding:11px;border-radius:9px;cursor:pointer;}

/* ════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-weight:700;padding:11px 20px;border-radius:10px;opacity:0;transition:all .3s;z-index:9999;background:var(--green);color:#000;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="load-logo">🍔 XIS</div>
  <div class="load-spin"></div>
</div>

<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">🍔 XIS</div>
    <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">Configuração do Firebase</p>
    <div class="sfield"><label>API Key</label><input id="s-apiKey"></div>
    <div class="sfield"><label>Project ID</label><input id="s-projectId"></div>
    <div class="sfield"><label>Database URL</label><input id="s-databaseURL"></div>
    <button class="sbtn" onclick="salvarConfig()">✅ Salvar e Conectar</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="logo">🍔 XIS</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('comandas')">Comandas <span class="badge-pill" id="badge-n">0</span></button>
      <button class="tab-btn" onclick="switchTab('lancar')">Novo Pedido</button>
    </div>
  </div>

  <div id="view-comandas" class="view active">
    <div class="grid" id="comandas-grid"></div>
  </div>
  
  </div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// Lógica de Inicialização, Firebase e manipulação de DOM extraída de comandas-v3.html
function salvarConfig() {
  const cfg = {
    apiKey: document.getElementById('s-apiKey').value,
    projectId: document.getElementById('s-projectId').value,
    databaseURL: document.getElementById('s-databaseURL').value
  };
  localStorage.setItem('xis_firebase_cfg', JSON.stringify(cfg));
  location.reload();
}

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
}

// O restante do script gerencia a sincronização em tempo real dos pedidos.
</script>

</body>
</html>
